<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Comando | IA Moderadora</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen flex items-center justify-center p-4">

    <div class="max-w-3xl w-full bg-gray-800 rounded-xl shadow-2xl p-8 border border-gray-700">
        <h1 class="text-3xl font-bold mb-2 text-emerald-400">🤖 Cérebro da IA</h1>
        <p class="text-gray-400 mb-6">Ajuste o comportamento do agente Gemini. O formato JSON de saída já está protegido no código-fonte.</p>

        <div class="mb-6">
            <label class="block text-sm font-medium text-gray-300 mb-2">Chave de Administração (ADMIN_API_KEY)</label>
            <div class="flex gap-2">
                <input type="password" id="adminKey" class="flex-1 bg-gray-700 border border-gray-600 rounded-lg px-4 py-2 focus:outline-none focus:border-emerald-500 transition-colors" placeholder="Cole sua senha mestre aqui...">
                <button onclick="carregarPrompt()" class="bg-gray-600 hover:bg-gray-500 text-white px-4 py-2 rounded-lg transition-colors font-medium">Carregar</button>
            </div>
        </div>

        <div class="mb-6">
            <label class="block text-sm font-medium text-gray-300 mb-2">Instrução Comportamental (Prompt)</label>
            <textarea id="promptText" rows="10" class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-3 focus:outline-none focus:border-emerald-500 transition-colors font-mono text-sm" placeholder="O prompt atual aparecerá aqui..."></textarea>
        </div>

        <div class="flex items-center justify-between">
            <span id="statusMsg" class="text-sm font-medium opacity-0 transition-opacity"></span>
            <button onclick="salvarPrompt()" class="bg-emerald-600 hover:bg-emerald-500 text-white px-6 py-2 rounded-lg font-bold shadow-lg transition-transform active:scale-95">💾 Salvar Alterações</button>
        </div>
    </div>

    <script>
        function showStatus(msg, isError = false) {
            const el = document.getElementById('statusMsg');
            el.textContent = msg;
            el.className = `text-sm font-medium transition-opacity opacity-100 ${isError ? 'text-red-400' : 'text-emerald-400'}`;
            setTimeout(() => el.style.opacity = '0', 4000);
        }

        async function carregarPrompt() {
            const key = document.getElementById('adminKey').value;
            if(!key) return showStatus('⚠️ Digite a chave admin primeiro.', true);

            try {
                const res = await fetch('/api/admin/prompt', {
                    headers: { 'Authorization': `Bearer ${key}` }
                });
                
                if(!res.ok) throw new Error('Acesso negado. Senha incorreta?');
                
                const data = await res.json();
                document.getElementById('promptText').value = data.prompt;
                showStatus('✅ Prompt carregado com sucesso!');
            } catch (error) {
                showStatus(`❌ Erro: ${error.message}`, true);
            }
        }

        async function salvarPrompt() {
            const key = document.getElementById('adminKey').value;
            const newPrompt = document.getElementById('promptText').value;
            
            if(!key) return showStatus('⚠️ Digite a chave admin primeiro.', true);

            try {
                const res = await fetch('/api/admin/prompt', {
                    method: 'POST',
                    headers: { 
                        'Authorization': `Bearer ${key}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ prompt: newPrompt })
                });

                if(!res.ok) throw new Error('Falha ao salvar. Senha incorreta?');
                
                showStatus('✅ Novo comportamento salvo e ativo!');
            } catch (error) {
                showStatus(`❌ Erro: ${error.message}`, true);
            }
        }
    </script>
</body>
</html>
